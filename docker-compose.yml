services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # ホストから直接つなぎたい場合用（任意）
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bin/dev-docker
    environment:
      RAILS_ENV: development
      DB_HOST: db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RAILS_MAX_THREADS: 5
    volumes:
      - .:/workspace/todo-app
      - bundle:/usr/local/bundle
    ports:
      - "3100:3000" # ホストの 3000 が他アプリと衝突するため 3100 を使用
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  pg_data:
  bundle:
